<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource — Magnolia Health Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
body{background:var(--bg)}

.res-topbar{background:var(--white);border-bottom:1px solid var(--stroke);padding:12px 28px}
.res-topbar-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.res-topbar .back{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;text-decoration:none;transition:color .2s}
.res-topbar .back:hover{color:var(--green)}
.res-topbar .back svg{width:12px;height:12px}
.res-topbar .crumbs{display:flex;gap:8px;font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--t4);flex-wrap:wrap;margin-left:14px;padding-left:14px;border-left:1px solid var(--stroke)}
.res-topbar .crumbs .div{opacity:.4}
.res-topbar .crumbs a{color:var(--t4);text-decoration:none;transition:color .2s}
.res-topbar .crumbs a:hover{color:var(--green)}
.res-topbar .crumbs .on{color:var(--green)}
.res-topbar .dl-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-pill);font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg2);border:1.5px solid rgba(5,99,86,.12);letter-spacing:.3px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-decoration:none}
.res-topbar .dl-btn:hover{background:var(--green);color:#fff}
.res-topbar .dl-btn svg{width:14px;height:14px}

.res-hero{background:linear-gradient(160deg,var(--green-xd) 0%,var(--green-d) 30%,var(--green) 60%,var(--green-d) 100%);padding:44px 28px 40px;text-align:center;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.res-hero::after{content:'';position:absolute;top:-40%;right:-20%;width:80%;height:180%;background:radial-gradient(ellipse,rgba(6,126,109,.25) 0%,transparent 65%);pointer-events:none}
.res-hero-in{position:relative;max-width:720px;margin:0 auto;z-index:1}
.res-hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:6px 18px;border-radius:var(--r-pill);font-size:10.5px;font-weight:700;color:rgba(255,255,255,.72);letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;backdrop-filter:blur(8px)}
.res-hero-dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.5)}
.res-hero h1{font-size:32px;font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.4px;margin-bottom:12px;font-family:'Playfair Display',serif}
.res-hero h1 em{font-style:normal;color:var(--sage)}
.res-hero p{font-size:14px;color:rgba(255,255,255,.58);max-width:560px;margin:0 auto;font-weight:400;line-height:1.7}

.res-wrap{max-width:1000px;margin:0 auto;padding:0 28px}
.res-body{margin-top:-20px;position:relative;z-index:2;padding-bottom:60px}

/* ─── Table-style resource card ─── */
.res-card{background:var(--white);border-radius:16px;box-shadow:var(--sh-lg);overflow:hidden;margin-bottom:20px;border:1px solid var(--stroke)}
.res-card-hdr{padding:16px 24px;background:var(--sage-xl);border-bottom:1px solid var(--stroke);display:flex;align-items:center;gap:12px}
.res-card-hdr .letter{width:32px;height:32px;border-radius:8px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Playfair Display',serif;flex-shrink:0}
.res-card-hdr h3{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.res-card-hdr .sub{font-size:11px;color:var(--t4);font-weight:500;margin-top:1px}

.res-table{width:100%;border-collapse:collapse}
.res-table th{text-align:left;padding:10px 24px;font-size:10px;font-weight:700;color:var(--t4);letter-spacing:1px;text-transform:uppercase;background:var(--sage-xl);border-bottom:1px solid var(--stroke)}
.res-table td{padding:12px 24px;border-bottom:1px solid var(--stroke);font-size:13.5px;font-weight:500;color:var(--t2);vertical-align:top;line-height:1.5}
.res-table tr:last-child td{border-bottom:none}
.res-table tr:hover td{background:rgba(5,99,86,.02)}
.res-table .label{font-weight:700;color:var(--t1);white-space:nowrap;min-width:160px}
.res-table .phone{font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;white-space:nowrap}
.res-table .phone a{color:var(--green);text-decoration:none;transition:color .2s}
.res-table .phone a:hover{color:var(--green-d);text-decoration:underline}
.res-table .note{font-size:11.5px;color:var(--t3);font-style:italic;font-weight:400}
.res-table .warn-row td{background:rgba(197,64,64,.03);border-left:3px solid #c54040}
.res-table .tip-row td{background:rgba(5,99,86,.03);border-left:3px solid var(--green)}

/* ─── Rich text sections (for forms, templates, etc.) ─── */
.res-section{padding:24px;border-bottom:1px solid var(--stroke)}
.res-section:last-child{border-bottom:none}
.res-section h4{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:6px;letter-spacing:-.1px}
.res-section .desc{font-size:13px;color:var(--t3);margin-bottom:14px;line-height:1.6}
.res-section .content{font-size:13.5px;color:var(--t2);line-height:1.7}
.res-section .content strong{color:var(--t1)}
.res-section .content em{color:var(--green-d);font-style:italic}
.res-section .content ul{margin:8px 0;padding-left:22px}
.res-section .content li{margin-bottom:6px}
.res-section .field{display:flex;gap:12px;padding:10px 16px;background:var(--sage-xl);border-radius:8px;margin-bottom:8px;align-items:baseline}
.res-section .field-label{font-size:11px;font-weight:700;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;min-width:140px;flex-shrink:0}
.res-section .field-value{font-size:13px;color:var(--t2);font-weight:500}

/* ─── Script blocks (copy-friendly) ─── */
.script-block{background:var(--sage-xl);border-radius:10px;padding:18px 22px;margin:10px 0;border-left:3px solid var(--green);font-size:13.5px;color:var(--t1);line-height:1.7;position:relative}
.script-block em{color:var(--green-d);font-style:italic}
.script-block .copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;color:var(--t4);background:var(--white);border:1px solid var(--stroke);cursor:pointer;transition:all .2s;letter-spacing:.3px;text-transform:uppercase}
.script-block .copy-btn:hover{color:var(--green);border-color:var(--green)}

/* ─── Warning / tip callouts ─── */
.res-warn{display:flex;gap:10px;padding:14px 18px;border-radius:10px;background:rgba(197,64,64,.04);border:1px solid rgba(197,64,64,.12);margin:10px 0;font-size:12.5px;color:#8b2020;line-height:1.5;font-weight:500}
.res-warn svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;color:#c54040}
.res-tip{display:flex;gap:10px;padding:14px 18px;border-radius:10px;background:var(--green-bg);border:1px solid rgba(5,99,86,.1);margin:10px 0;font-size:12.5px;color:var(--green-d);line-height:1.5;font-weight:500}
.res-tip svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;color:var(--green)}

/* ─── Tier badges ─── */
.tier{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:700;letter-spacing:.3px}
.tier.green{background:rgba(34,197,94,.08);color:#16a34a}
.tier.yellow{background:rgba(234,179,8,.08);color:#b45309}
.tier.red{background:rgba(239,68,68,.08);color:#dc2626}

@media print{
  .res-topbar,.nav,.dl-btn{display:none!important}
  .res-hero{padding:24px 16px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .res-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
}

@media (max-width:680px){
  .res-hero h1{font-size:24px}
  .res-table td,.res-table th{padding:10px 14px;font-size:12.5px}
  .res-card-hdr{padding:12px 14px}
  .res-section{padding:16px}
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav"><div class="nav-in">
  <div class="nav-brand">
    <span class="mark">MAGNOLIA <em>Health Care</em></span>
    <span class="sub">OPERATIONS</span>
  </div>
  <div class="nav-links">
    <a href="https://www.magnoliahealthcare.org">Home</a>
    <a href="https://www.magnoliahealthcare.org/our-philosophy">Our Philosophy</a>
    <a href="https://www.magnoliahealthcare.org/atlas-ai">Atlas AI</a>
    <a href="index.html" class="on">Operations Hub</a>
    <a href="https://www.magnoliahealthcare.org/contact-us">Contact Us</a>
  </div>
</div></nav>

<!-- Top bar -->
<div class="res-topbar"><div class="res-topbar-in">
  <a class="back" id="backLink" href="view.html?dept=support&view=resources">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Resources
  </a>
  <div class="crumbs" id="crumbs"></div>
  <a class="dl-btn" id="dlBtn" href="#" onclick="window.print();return false;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Print / Save PDF
  </a>
</div></div>

<!-- Hero -->
<div class="res-hero"><div class="res-hero-in">
  <div class="res-hero-badge"><span class="res-hero-dot"></span> <span id="heroCat">Quick Reference</span></div>
  <h1 id="heroTitle">Resource</h1>
  <p id="heroDesc"></p>
</div></div>

<!-- Body -->
<div class="res-wrap"><div class="res-body" id="resBody">
  <p style="padding:40px 0;text-align:center;color:var(--t3)">Resource not found.</p>
</div></div>

<script src="resources-data.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const dept = params.get('dept') || 'support';
  const res = window.RESOURCES && window.RESOURCES[id];

  document.getElementById('backLink').href = `view.html?dept=${dept}&view=resources`;

  if (!res) return;

  document.title = res.titlePlain + ' — Magnolia Health Care';
  document.getElementById('heroTitle').innerHTML = res.title;
  document.getElementById('heroDesc').textContent = res.description;
  document.getElementById('heroCat').textContent = res.category || 'Quick Reference';

  const crumbs = document.getElementById('crumbs');
  crumbs.innerHTML = `
    <a href="index.html">Hub</a><span class="div">/</span>
    <a href="view.html?dept=${dept}&view=resources">Resources</a><span class="div">/</span>
    <span class="on">${res.titlePlain}</span>`;

  const body = document.getElementById('resBody');

  if (res.type === 'table') {
    body.innerHTML = res.groups.map(g => `
      <div class="res-card">
        <div class="res-card-hdr">
          <div class="letter">${g.letter}</div>
          <div><h3>${g.heading}</h3>${g.sub ? `<div class="sub">${g.sub}</div>` : ''}</div>
        </div>
        <table class="res-table">
          <thead><tr>${g.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${g.rows.map(r => {
            const cls = r.warn ? ' class="warn-row"' : (r.tip ? ' class="tip-row"' : '');
            return `<tr${cls}>${r.cells.map((c,i) => {
              let tdCls = '';
              if (i === 0) tdCls = ' class="label"';
              else if (c && c.match && c.match(/^\d{3}-\d{3}-\d{4}/)) tdCls = ' class="phone"';
              const phoneLink = (tdCls.includes('phone') && c) ? c.replace(/(\d{3}-\d{3}-\d{4})/g, '<a href="tel:$1">$1</a>') : c;
              return `<td${tdCls}>${phoneLink || '—'}</td>`;
            }).join('')}</tr>` + (r.note ? `<tr><td colspan="${g.columns.length}" style="padding:4px 24px 12px"><span class="note">${r.note}</span></td></tr>` : '');
          }).join('')}</tbody>
        </table>
      </div>`).join('');
  }

  else if (res.type === 'sections') {
    body.innerHTML = res.groups.map(g => `
      <div class="res-card">
        <div class="res-card-hdr">
          <div class="letter">${g.letter}</div>
          <div><h3>${g.heading}</h3>${g.sub ? `<div class="sub">${g.sub}</div>` : ''}</div>
        </div>
        ${g.items.map(it => `
          <div class="res-section">
            <h4>${it.title}</h4>
            ${it.desc ? `<div class="desc">${it.desc}</div>` : ''}
            ${it.fields ? it.fields.map(f => `
              <div class="field">
                <span class="field-label">${f.label}</span>
                <span class="field-value">${f.value}</span>
              </div>`).join('') : ''}
            ${it.script ? `<div class="script-block"><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.innerText.replace('COPY','').trim())">Copy</button>${it.script}</div>` : ''}
            ${it.content ? `<div class="content">${it.content}</div>` : ''}
            ${it.warn ? `<div class="res-warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><div>${it.warn}</div></div>` : ''}
            ${it.tip ? `<div class="res-tip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><div>${it.tip}</div></div>` : ''}
          </div>`).join('')}
      </div>`).join('');
  }

  else if (res.type === 'scorecard') {
    body.innerHTML = res.groups.map(g => `
      <div class="res-card">
        <div class="res-card-hdr">
          <div class="letter">${g.letter}</div>
          <div><h3>${g.heading}</h3>${g.sub ? `<div class="sub">${g.sub}</div>` : ''}</div>
        </div>
        <table class="res-table">
          <thead><tr><th>Criteria</th><th style="width:80px;text-align:center">Points</th></tr></thead>
          <tbody>${g.rows.map(r => {
            const cls = r.autoFail ? ' class="warn-row"' : '';
            return `<tr${cls}><td>${r.criteria}</td><td style="text-align:center;font-weight:700;color:${r.autoFail ? '#c54040' : 'var(--green)'}">${r.points}</td></tr>`;
          }).join('')}</tbody>
        </table>
        ${g.note ? `<div style="padding:12px 24px;font-size:12px;color:var(--t3);font-style:italic;border-top:1px solid var(--stroke)">${g.note}</div>` : ''}
      </div>`).join('') + (res.tiers ? `
      <div class="res-card">
        <div class="res-card-hdr"><div class="letter">★</div><div><h3>Scoring Tiers</h3></div></div>
        <div style="padding:20px 24px;display:flex;gap:14px;flex-wrap:wrap">
          ${res.tiers.map(t => `<div style="flex:1;min-width:200px;padding:16px 18px;border-radius:12px;background:${t.bg}">
            <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:${t.color};margin-bottom:4px">${t.label}</div>
            <div style="font-size:22px;font-weight:700;color:${t.color};font-family:'Playfair Display',serif">${t.range}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:4px">${t.action}</div>
          </div>`).join('')}
        </div>
      </div>` : '');
  }

})();
</script>
</body>
</html>
